name: Deploy to GitHub Pages

on:
  push:
    branches: [claude/guitar-practice-journal-2ekqto, main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: GuitarJournal/package-lock.json

      - name: Install dependencies
        working-directory: GuitarJournal
        run: npm ci
        
      - name: Ensure Web Dependencies are Present
        run: npx expo install react-native-web react-dom

      - name: Export Expo web build
        working-directory: GuitarJournal
        run: npx expo export --platform web
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: GuitarJournal/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
